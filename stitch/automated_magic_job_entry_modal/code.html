<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Job Application - JobTracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                    animation: {
                        'shimmer': 'shimmer 2s infinite linear',
                        'progress': 'progress 3s ease-in-out infinite',
                        'glow': 'glow 2s infinite alternate',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        },
                        progress: {
                            '0%': { width: '0%', opacity: '0.3' },
                            '50%': { width: '70%', opacity: '1' },
                            '100%': { width: '100%', opacity: '0.3' },
                        },
                        glow: {
                            'from': { boxShadow: '0 0 5px rgba(236, 91, 19, 0.2), 0 0 10px rgba(236, 91, 19, 0.1)' },
                            'to': { boxShadow: '0 0 20px rgba(236, 91, 19, 0.4), 0 0 30px rgba(236, 91, 19, 0.2)' },
                        }
                    }
                },
            },
        }
    </script>
<style>
        .ai-shimmer {
            background: linear-gradient(90deg, transparent, rgba(34, 197, 94, 0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        .ai-glow {
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.4) !important;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-hidden blur-md pointer-events-none select-none">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-10 py-3 bg-white dark:bg-background-dark/50">
<div class="flex items-center gap-8">
<div class="flex items-center gap-4 text-primary">
<span class="material-symbols-outlined text-3xl">database</span>
<h2 class="text-slate-900 dark:text-white text-lg font-bold">JobTracker</h2>
</div>
<div class="flex items-center gap-9">
<span class="text-primary text-sm font-medium">Dashboard</span>
<span class="text-slate-600 dark:text-slate-400 text-sm font-medium">Applications</span>
<span class="text-slate-600 dark:text-slate-400 text-sm font-medium">Insights</span>
</div>
</div>
<div class="flex flex-1 justify-end gap-8">
<div class="h-10 w-64 bg-slate-100 dark:bg-slate-800 rounded-xl"></div>
<div class="size-10 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
</header>
<main class="flex-1 px-40 py-8">
<div class="grid grid-cols-3 gap-6 mb-8">
<div class="h-32 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50"></div>
<div class="h-32 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50"></div>
<div class="h-32 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50"></div>
</div>
<div class="h-96 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50"></div>
</main>
</div>
</div>
<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
<div class="bg-white dark:bg-background-dark w-full max-w-2xl rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="px-8 py-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between bg-white dark:bg-background-dark">
<div>
<h2 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
                    Add New Job Application
                    <span class="material-symbols-outlined text-primary text-xl animate-pulse">auto_fix_high</span>
</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Paste a URL to automatically extract job details.</p>
</div>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<form class="p-8 space-y-6">
<!-- Magic URL Input -->
<div class="space-y-2">
<label class="block text-sm font-bold text-primary flex items-center gap-2">
<span class="material-symbols-outlined text-sm">magic_button</span>
                    Paste Job URL (LinkedIn, Indeed, etc.)
                </label>
<div class="relative">
<input class="w-full pl-4 pr-12 py-4 rounded-xl border-2 border-primary/30 dark:border-primary/20 bg-primary/5 dark:bg-primary/10 focus:ring-4 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white placeholder:text-slate-400 font-medium text-base animate-glow" placeholder="https://www.linkedin.com/jobs/view/..." type="url" value="https://www.linkedin.com/jobs/view/3948572/"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary">auto_awesome</span>
</div>
</div>
<!-- Scanning State -->
<div class="space-y-3">
<div class="flex items-center justify-between text-xs font-bold text-slate-500 uppercase tracking-wider">
<span class="flex items-center gap-2">
<span class="size-2 bg-primary rounded-full animate-ping"></span>
                        Scanning requirements...
                    </span>
<span class="text-primary italic">AI at work</span>
</div>
<div class="w-full bg-slate-100 dark:bg-slate-800 h-1.5 rounded-full overflow-hidden">
<div class="bg-primary h-full animate-progress rounded-full shadow-[0_0_10px_#ec5b13]"></div>
</div>
</div>
<div class="grid grid-cols-2 gap-6">
<div class="col-span-2 sm:col-span-1">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Job Title</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-green-500 text-lg">work</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-green-50/30 dark:bg-green-900/10 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white placeholder:text-slate-400 ai-glow ai-shimmer" placeholder="e.g. Senior Product Designer" type="text" value="Senior Product Designer"/>
</div>
</div>
<div class="col-span-2 sm:col-span-1">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Company</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-green-500 text-lg">apartment</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-green-50/30 dark:bg-green-900/10 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white placeholder:text-slate-400 ai-glow ai-shimmer" placeholder="e.g. Google" type="text" value="Google"/>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-6">
<div class="col-span-2 sm:col-span-1">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Salary Range</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-green-500 text-lg">payments</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-green-50/30 dark:bg-green-900/10 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white placeholder:text-slate-400 ai-glow ai-shimmer" placeholder="$120k - $150k" type="text" value="$140,000 - $185,000"/>
</div>
</div>
<div class="col-span-2 sm:col-span-1">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Date Submitted</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">calendar_today</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white" type="date" value="2023-11-15"/>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-6">
<div class="col-span-2 sm:col-span-1">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Work Location</label>
<div class="flex p-1 bg-slate-100 dark:bg-slate-800 rounded-xl gap-1 ai-glow">
<button class="flex-1 py-2 text-sm font-medium rounded-lg text-slate-500 hover:bg-white/50 dark:hover:bg-slate-700 transition-all" type="button">Remote</button>
<button class="flex-1 py-2 text-sm font-medium rounded-lg bg-white dark:bg-primary text-slate-900 dark:text-white shadow-sm border border-slate-200 dark:border-transparent" type="button">Hybrid</button>
<button class="flex-1 py-2 text-sm font-medium rounded-lg text-slate-500 hover:bg-white/50 dark:hover:bg-slate-700 transition-all" type="button">On-site</button>
</div>
</div>
<div class="col-span-2 sm:col-span-1">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Status Tracking</label>
<div class="relative">
<select class="w-full appearance-none pl-4 pr-10 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-white font-medium cursor-pointer">
<option value="wishlist">Wishlist</option>
<option selected="" value="applied">Applied</option>
<option value="interview">Interviewing</option>
<option value="offer">Offer Received</option>
<option value="rejected">Rejected</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
</div>
</form>
<div class="px-8 py-6 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-200 dark:border-slate-800 flex items-center justify-end gap-4">
<button class="px-6 py-3 text-sm font-bold text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
                Cancel
            </button>
<button class="px-8 py-3 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-lg">check_circle</span>
                Save Application
            </button>
</div>
</div>
</div>
</body></html>
