<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobTracker Pro — Clipper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: 'Inter', system-ui, sans-serif;
      background: #030712;
      color: #f8fafc;
      padding: 20px;
      min-height: 300px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e293b;
    }
    .logo {
      width: 36px; height: 36px;
      background: #4f46e5;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header h1 { font-size: 15px; font-weight: 700; color: #f8fafc; }
    .header p { font-size: 11px; color: #64748b; }

    .job-card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .job-card h2 { font-size: 14px; font-weight: 700; color: #e2e8f0; margin-bottom: 4px; }
    .job-card p { font-size: 12px; color: #94a3b8; }
    .job-card .meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 999px;
      background: #1e293b; color: #94a3b8;
    }

    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group select {
      width: 100%;
      padding: 8px 12px;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }
    .form-group select:focus { border-color: #4f46e5; }

    .auth-section {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .auth-section .auth-status {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .auth-status.logged-in { color: #34d399; }
    .auth-status.logged-out { color: #f87171; }

    .btn {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 8px;
    }
    .btn:hover { background: #4338ca; }
    .btn:disabled { background: #334155; cursor: not-allowed; }
    .btn.secondary {
      background: #1e293b;
      color: #94a3b8;
      font-size: 12px;
      padding: 8px;
    }
    .btn.secondary:hover { background: #334155; color: #e2e8f0; }

    .status {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      display: none;
    }
    .status.success { background: #064e3b; color: #6ee7b7; display: block; }
    .status.error   { background: #450a0a; color: #fca5a5; display: block; }
    .status.info    { background: #1e3a5f; color: #93c5fd; display: block; }

    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #64748b;
      font-size: 13px;
    }
    .empty-state span { display: block; font-size: 32px; margin-bottom: 10px; }
    .user-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #64748b;
    }
    .user-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: #34d399; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🎯</div>
    <div>
      <h1>JobTracker Pro</h1>
      <p>Job Clipper Extension</p>
    </div>
  </div>

  <!-- Auth Status Area -->
  <div class="auth-section">
    <div id="auth-status" class="auth-status logged-out">⚠ Not connected to JobTracker</div>
    <div id="user-info" class="user-pill" style="display:none">
      <div class="dot"></div>
      <span id="user-email-display">—</span>
    </div>
    <button class="btn secondary" id="sync-auth-btn" style="margin-top:10px">
      🔗 Sync from JobTracker Tab
    </button>
  </div>

  <div id="job-card" class="job-card" style="display:none">
    <h2 id="job-title">—</h2>
    <p id="job-company">—</p>
    <div class="meta">
      <span class="badge" id="job-location">—</span>
    </div>
  </div>

  <div id="empty-state" class="empty-state">
    <span>🔍</span>
    <p>Navigate to a LinkedIn or Indeed job posting to clip it.</p>
  </div>

  <div id="form-section" style="display:none">
    <div class="form-group">
      <label>Stage</label>
      <select id="status-select">
        <option value="WISHLIST">Wishlist</option>
        <option value="APPLIED">Applied</option>
        <option value="INTERVIEW">Interviewing</option>
      </select>
    </div>
    <button class="btn" id="clip-btn">⚡ Clip to JobTracker</button>
    <div class="status" id="status-msg"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
